<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>般若波罗蜜多心经</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:10px}
.container{max-width:900px;margin:0 auto;background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden}
.header{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:white;padding:20px 15px;text-align:center}
.header h1{font-size:1.5em;margin-bottom:5px}
.progress-bar{background:rgba(255,255,255,0.3);border-radius:10px;height:6px;margin-top:10px}
.progress-fill{background:white;height:100%;width:0%;transition:width 0.3s}
.nav{display:flex;justify-content:space-around;padding:10px;background:#f8f9fa}
.nav-btn{padding:8px 12px;border:none;background:#667eea;color:white;border-radius:8px;cursor:pointer;font-size:0.85em}
.nav-btn.active{background:#f5576c}
.settings{display:flex;gap:10px;padding:10px 15px;background:#f0f0f0}
.toggle-group{display:flex;align-items:center;gap:5px;font-size:0.85em}
.toggle-switch{position:relative;width:44px;height:24px}
.toggle-switch input{opacity:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;transition:.3s;border-radius:24px}
.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:white;transition:.3s;border-radius:50%}
input:checked+.toggle-slider{background:#4ade80}
input:checked+.toggle-slider:before{transform:translateX(20px)}
.content{padding:15px;padding-bottom:100px}
.jingwen-container{background:#faf8f5;padding:20px 15px;border-radius:15px}
.jingwen-title{text-align:center;margin-bottom:20px;color:#667eea;font-size:1.4em;border-bottom:2px solid #667eea;padding-bottom:10px}
.jingwen-text{font-size:1.2em;line-height:2.6;color:#333}
ruby{ruby-align:center}
ruby rt{font-size:0.45em;color:#666}
.hide-pinyin ruby rt{opacity:0}
.punct{margin:0 2px}
.term{background:linear-gradient(transparent 60%,#fff3cd 60%);cursor:pointer}
.note-popup{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,0.2);padding:20px;transform:translateY(100%);transition:transform 0.3s;z-index:1000;max-height:60vh;overflow-y:auto}
.note-popup.show{transform:translateY(0)}
.note-popup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.note-popup-title{font-size:1.3em;color:#667eea;font-weight:bold}
.note-popup-close{width:32px;height:32px;border:none;background:#f0f0f0;border-radius:50%;cursor:pointer;font-size:1.2em}
.note-popup p{margin:10px 0;color:#666}
.note-popup .pinyin-text{font-size:1.1em;color:#f5576c;font-weight:bold}
.control-bar{position:fixed;bottom:0;left:0;right:0;background:white;box-shadow:0 -4px 20px rgba(0,0,0,0.15);padding:12px 15px;z-index:100;display:flex;gap:8px}
.control-btn{flex:1;min-width:60px;padding:12px 6px;border:none;border-radius:8px;cursor:pointer;font-size:0.85em}
.play-btn{background:linear-gradient(135deg,#4ade80 0%,#22c55e 100%);color:white}
.pause-btn{background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 100%);color:white}
.stop-btn{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:white}
.speed-select{padding:8px 6px;border:2px solid #667eea;border-radius:8px;font-size:0.8em;background:white;max-width:70px}
.stats{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:15px}
.stat-card{background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:white;padding:15px;border-radius:10px;text-align:center}
.stat-number{font-size:2em;font-weight:bold}
.notification{position:fixed;top:15px;right:15px;background:white;padding:12px 18px;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.2);display:none;z-index:1001;border-left:5px solid #4ade80}
.notification.show{display:block}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);display:none;z-index:999}
.overlay.show{display:block}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>📿 般若波罗蜜多心经</h1>
<p>注音注解版</p>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>
<div class="nav">
<button class="nav-btn active" data-tab="read">📖 诵读</button>
<button class="nav-btn" data-tab="stats">📊 进度</button>
</div>
<div class="settings">
<div class="toggle-group">
<label class="toggle-switch"><input type="checkbox" id="togglePinyin" checked><span class="toggle-slider"></span></label>
<span>拼音</span>
</div>
</div>
<div class="content">
<div id="readTab">
<div class="control-bar">
<button class="control-btn play-btn" id="playBtn">▶️ 播放</button>
<button class="control-btn pause-btn" id="pauseBtn">⏸️ 暂停</button>
<button class="control-btn stop-btn" id="stopBtn">⏹️ 停止</button>
<select class="speed-select" id="speedSelect">
<option value="0.7">0.7x</option>
<option value="0.9">0.9x</option>
<option value="1" selected>1.0x</option>
<option value="1.2">1.2x</option>
</select>
</div>
<div class="stats"><div class="stat-card"><div class="stat-number" id="totalReads">0</div><div class="stat-label">累计诵读遍数</div></div></div>
<div class="jingwen-container">
<h3 class="jingwen-title">般若波罗蜜多心经</h3>
<div id="jingwenContent"></div>
</div>
</div>
<div id="statsTab" style="display:none">
<h2 style="margin-bottom:15px;color:#333">诵读统计</h2>
<div class="stats"><div class="stat-card" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)"><div class="stat-number" id="totalDays">0</div><div class="stat-label">累计天数</div></div></div>
</div>
</div>
</div>
<div class="notification" id="notification"></div>
<div class="overlay" id="overlay" onclick="closeNotePopup()"></div>
<div class="note-popup" id="notePopup">
<div class="note-popup-header">
<span class="note-popup-title" id="notePopupTitle">词汇</span>
<button class="note-popup-close" onclick="closeNotePopup()">✕</button>
</div>
<p><span class="pinyin-text" id="notePopupPinyin"></span></p>
<p id="notePopupNote"></p>
</div>

<script>
const xinJingText='观自在菩萨，行深般若波罗蜜多时，照见五蕴皆空，度一切苦厄。舍利子，色不异空，空不异色，色即是空，空即是色，受想行识，亦复如是。舍利子，是诸法空相，不生不灭，不垢不净，不增不减。是故空中无色，无受想行识，无眼耳鼻舌身意，无色声香味触法，无眼界，乃至无意识界。无无明，亦无无明尽，乃至无老死，亦无老死尽。无苦集灭道，无智亦无得。以无所得故，菩提萨埵，依般若波罗蜜多故，心无挂碍，无挂碍故，无有恐怖，远离颠倒梦想，究竟涅槃。三世诸佛，依般若波罗蜜多故，得阿耨多罗三藐三菩提。故知般若波罗蜜多，是大神咒，是大明咒，是无上咒，是无等等咒，能除一切苦，真实不虚。故说般若波罗蜜多咒，即说咒曰：揭谛揭谛，波罗揭谛，波罗僧揭谛，菩提萨婆诃。';

const annotations={
"观自在菩萨":{pinyin:"guān zì zài pú sà",note:"观世音菩萨"},
"般若波罗蜜多":{pinyin:"bō rě bō luó mì duō",note:"智慧到彼岸"},
"五蕴":{pinyin:"wǔ yùn",note:"色受想行识"},
"舍利子":{pinyin:"shè lì zǐ",note:"舍利弗"},
"涅槃":{pinyin:"niè pán",note:"寂灭"},
"阿耨多罗三藐三菩提":{pinyin:"ā nòu duō luó sān miǎo sān pú tí",note:"无上正等正觉"}
};

const charPinyin={"观":"guān","自":"zì","在":"zài","菩":"pú","萨":"sà","行":"xíng","深":"shēn","般":"bō","若":"rě","波":"bō","罗":"luó","蜜":"mì","多":"duō","时":"shí","照":"zhào","见":"jiàn","五":"wǔ","蕴":"yùn","皆":"jiē","空":"kōng","度":"dù","一":"yī","切":"qiè","苦":"kǔ","厄":"è","舍":"shè","利":"lì","子":"zǐ","色":"sè","不":"bù","异":"yì","即":"jí","是":"shì","受":"shòu","想":"xiǎng","识":"shí","亦":"yì","复":"fù","如":"rú","诸":"zhū","法":"fǎ","相":"xiàng","生":"shēng","灭":"miè","垢":"gòu","净":"jìng","增":"zēng","减":"jiǎn","故":"gù","中":"zhōng","无":"wú","眼":"yǎn","耳":"ěr","鼻":"bí","舌":"shé","身":"shēn","意":"yì","声":"shēng","香":"xiāng","味":"wèi","触":"chù","界":"jiè","乃":"nǎi","至":"zhì","明":"míng","尽":"jìn","老":"lǎo","死":"sǐ","智":"zhì","得":"dé","以":"yǐ","所":"suǒ","提":"tí","埵":"duǒ","依":"yī","心":"xīn","挂":"guà","碍":"ài","有":"yǒu","恐":"kǒng","怖":"bù","远":"yuǎn","离":"lí","颠":"diān","倒":"dǎo","梦":"mèng","究":"jiū","竟":"jìng","涅":"niè","槃":"pán","三":"sān","世":"shì","佛":"fó","耨":"nòu","藐":"miǎo","大":"dà","神":"shén","咒":"zhòu","除":"chú","真":"zhēn","实":"shí","虚":"xū","说":"shuō","揭":"jiē","谛":"dì","僧":"sēng","婆":"pó","诃":"hē"};

let stats=JSON.parse(localStorage.getItem('xinjing_stats')||'{"totalDays":0,"lastVisit":null}');
let isPlaying=false;

// Android TTS回调
window.onProgress=function(current,total){
  const pct=Math.round((current/total)*100);
  document.getElementById('progressFill').style.width=pct+'%';
};

window.onPlaybackEnd=function(){
  isPlaying=false;
  document.getElementById('playBtn').textContent='▶️ 播放';
  completeReading();
};

function init(){
  renderJingwen();
  updateStats();
  setupEvents();
}

function renderJingwen(){
  let html='';
  for(let i=0;i<xinJingText.length;i++){
    const c=xinJingText[i];
    if(c==='\n')continue;
    if(/[，。！？；：、]/.test(c)){
      html+='<span class="punct">'+c+'</span>';
    }else if(charPinyin[c]){
      html+='<span><ruby>'+c+'<rt>'+charPinyin[c]+'</rt></ruby></span>';
    }else{
      html+='<span>'+c+'</span>';
    }
  }
  document.getElementById('jingwenContent').innerHTML='<div class="jingwen-text"><p>'+html+'</p></div>';
}

function setupEvents(){
  document.getElementById('playBtn').addEventListener('click',playAudio);
  document.getElementById('pauseBtn').addEventListener('click',pauseAudio);
  document.getElementById('stopBtn').addEventListener('click',stopAudio);
  document.getElementById('togglePinyin').addEventListener('change',function(){
    document.getElementById('jingwenContent').classList.toggle('hide-pinyin',!this.checked);
  });
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('readTab').style.display=this.dataset.tab==='read'?'block':'none';
      document.getElementById('statsTab').style.display=this.dataset.tab==='stats'?'block':'none';
    });
  });
}

function playAudio(){
  if(isPlaying)return;
  isPlaying=true;
  document.getElementById('playBtn').textContent='⏸️ 播放中';
  const speed=parseFloat(document.getElementById('speedSelect').value);
  
  // 优先使用Android TTS
  if(window.AndroidTTS && window.AndroidTTS.isReady()){
    const chunks=[];
    let current='';
    for(let i=0;i<xinJingText.length;i++){
      current+=xinJingText[i];
      if(/[，。！？、；]/.test(xinJingText[i])){
        chunks.push(current.trim());
        current='';
      }
    }
    if(current.trim())chunks.push(current.trim());
    window.AndroidTTS.play(JSON.stringify(chunks),speed);
    showNotification('开始播放');
  }
}

function pauseAudio(){
  if(window.AndroidTTS){
    window.AndroidTTS.pause();
  }
  isPlaying=false;
  document.getElementById('playBtn').textContent='▶️ 播放';
  showNotification('已暂停');
}

function stopAudio(){
  if(window.AndroidTTS){
    window.AndroidTTS.stop();
  }
  isPlaying=false;
  document.getElementById('playBtn').textContent='▶️ 播放';
  document.getElementById('progressFill').style.width='0%';
}

function completeReading(){
  const total=parseInt(localStorage.getItem('xinjing_total')||'0')+1;
  localStorage.setItem('xinjing_total',total);
  updateStats();
  showNotification('🎉 功德圆满！已诵读 '+total+' 遍');
}

function updateStats(){
  const total=parseInt(localStorage.getItem('xinjing_total')||'0');
  document.getElementById('totalReads').textContent=total;
  document.getElementById('totalDays').textContent=stats.totalDays;
  
  const today=new Date().toDateString();
  if(stats.lastVisit!==today){
    stats.totalDays++;
    stats.lastVisit=today;
    localStorage.setItem('xinjing_stats',JSON.stringify(stats));
  }
}

function showNotification(msg){
  const n=document.getElementById('notification');
  n.textContent=msg;
  n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),3000);
}

function closeNotePopup(){
  document.getElementById('notePopup').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

init();
</script>
</body>
</html>
